# Local Neo4j 5 community + APOC, and local Postgres 16, for AI Discovery
# Canvas.
#
#   docker compose up -d      # start both (run the backend on the host via
#                              # `python main.py` — see backend/README)
#   docker compose down       # stop (data retained in the named volumes)
#   docker compose down -v    # stop + WIPE both volumes (fresh DBs)
#
# Based on frd-generator's docker-compose.yml `neo4j` service, with the
# HOST-side port mappings, volume names, and compose project `name` all
# changed so this stack can run ALONGSIDE the frd-generator stack on the
# same machine without colliding:
#
#   frd-generator          ai-discovery-canvas
#   ---------------------   ---------------------
#   7474 (HTTP)      ->     7475 (HTTP)
#   7687 (Bolt)       ->    7688 (Bolt)
#   volume neo4j_data ->    canvas_neo4j_data
#   volume neo4j_logs ->    canvas_neo4j_logs
#   project "navicore" ->   project "ai-discovery-canvas"
#
# Postgres is new to this project (frd-generator has no equivalent), so its
# standard port 5432 is free — no host mapping needs shifting.
#
# Set NEO4J_PASSWORD / POSTGRES_PASSWORD in a `.env` file next to this
# compose file (compose auto-loads it for ${VAR} interpolation), or rely on
# the `canvas-dev` fallbacks below for local dev.

name: ai-discovery-canvas

services:
  neo4j:
    image: neo4j:5.20-community
    container_name: canvas-neo4j
    restart: unless-stopped
    ports:
      - "7475:7474"   # HTTP / browser UI (frd-generator uses 7474)
      - "7688:7687"   # Bolt protocol / driver (frd-generator uses 7687)
    environment:
      NEO4J_AUTH: "neo4j/${NEO4J_PASSWORD:-canvas-dev}"
      NEO4J_server_memory_heap_initial__size: "512m"
      NEO4J_server_memory_heap_max__size: "2G"
      NEO4J_server_memory_pagecache_size: "1G"
      NEO4J_db_transaction_timeout: "60s"
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - canvas_neo4j_data:/data
      - canvas_neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  postgres:
    image: postgres:16
    container_name: canvas-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ai_discovery_canvas
      POSTGRES_USER: canvas
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-canvas-dev}"
    volumes:
      - canvas_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U canvas -d ai_discovery_canvas"]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  canvas_neo4j_data:
  canvas_neo4j_logs:
  canvas_postgres_data:
